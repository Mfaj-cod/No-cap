{% extends "base.html" %}

{% block title %}Verify OTP - {{ store_name }}{% endblock %}

{% block content %}
<section class="page-shell auth-shell">
    <div class="container">
        <div class="section-card auth-card scroll-reveal">
            <div class="auth-card__header">
                <div class="stat-pill mx-auto mb-3"><i class="bi bi-shield-lock"></i>Step 2 of 2</div>
                <h1 class="section-title mb-2">Verify OTP</h1>
                <p class="section-copy mb-1">Enter the 6-digit code sent to your email address.</p>
                <p class="helper-copy mb-0">Email: {{ email }}</p>
            </div>

            <form method="POST" action="{{ url_for('verify_otp_submit') }}" class="auth-stack">
                <div>
                    <label for="otp" class="form-label">One-Time Password</label>
                    <input type="text" id="otp" name="otp" class="form-control form-control-lg" placeholder="Enter 6-digit OTP" pattern="[0-9]{6}" maxlength="6" inputmode="numeric" required>
                    <div class="helper-copy small mt-2">OTP expires in 10 minutes.</div>
                </div>
                <button type="submit" class="btn btn-warning btn-lg w-100">Verify OTP</button>
            </form>

            <div class="auth-footer">
                Did not receive it? <a href="{{ url_for('forgot_password') }}" class="text-warning text-decoration-none">Request a new OTP</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
