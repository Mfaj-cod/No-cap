{% extends "base.html" %}

{% block title %}Reset Password - {{ store_name }}{% endblock %}

{% block content %}
<section class="page-shell auth-shell">
    <div class="container">
        <div class="section-card auth-card scroll-reveal">
            <div class="auth-card__header">
                <div class="stat-pill mx-auto mb-3"><i class="bi bi-key"></i>Create a new password</div>
                <h1 class="section-title mb-2">Create New Password</h1>
                <p class="section-copy mb-0">Choose a fresh password with at least 6 characters.</p>
            </div>

            <form method="POST" action="{{ url_for('reset_password_submit') }}" class="auth-stack">
                <div>
                    <label for="new_password" class="form-label">New Password</label>
                    <input type="password" id="new_password" name="new_password" class="form-control form-control-lg" minlength="6" autocomplete="new-password" required>
                    <div class="helper-copy small mt-2">Minimum 6 characters required.</div>
                </div>
                <div>
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control form-control-lg" minlength="6" autocomplete="new-password" required>
                </div>
                <button type="submit" class="btn btn-warning btn-lg w-100">Reset Password</button>
            </form>

            <div class="auth-footer">
                <a href="{{ url_for('login') }}" class="text-warning text-decoration-none">Back to login</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
