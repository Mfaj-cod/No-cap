{% extends "base.html" %}

{% block title %}Reset Password - {{ Nocap }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card bg-dark text-light shadow-lg border-0">
                <div class="card-body p-4">
                    <h2 class="text-warning mb-3 text-center">Create New Password</h2>
                    <p class="text-white text-center">Enter your new password below.</p>
                    <form method="POST" action="{{ url_for('reset_password_submit') }}">
                        <div class="mb-3">
                            <label for="new_password" class="form-label">New Password</label>
                            <input 
                                type="password" 
                                id="new_password" 
                                name="new_password" 
                                class="form-control" 
                                minlength="6"
                                required>
                            <small class="form-text text-muted">Minimum 6 characters required.</small>
                        </div>
                        <div class="mb-3">
                            <label for="confirm_password" class="form-label">Confirm Password</label>
                            <input 
                                type="password" 
                                id="confirm_password" 
                                name="confirm_password" 
                                class="form-control" 
                                minlength="6"
                                required>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 btn-lg">Reset Password</button>
                    </form>
                    <p class="small text-center text-white mt-3 mb-0">
                        <a href="{{ url_for('login') }}" class="text-warning">Back to login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
