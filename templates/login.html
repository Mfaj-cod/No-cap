{% extends "base.html" %}

{% block title %}Login - {{ store_name }}{% endblock %}

{% block content %}
<section class="page-shell auth-shell">
    <div class="container">
        <div class="section-card auth-card scroll-reveal">
            <div class="auth-card__header">
                <div class="stat-pill mx-auto mb-3"><i class="bi bi-person-check"></i>Customer and shop-owner access</div>
                <h1 class="section-title mb-2">Login</h1>
                <p class="section-copy mb-0">Access your retail or wholesale-ready account from the same clean mobile-first sign-in screen.</p>
            </div>

            <form method="POST" action="{{ url_for('login_user') }}" class="auth-stack">
                <div>
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control form-control-lg" autocomplete="email" required>
                </div>
                <div>
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-control form-control-lg" autocomplete="current-password" required>
                    <div class="mt-2"><a href="{{ url_for('forgot_password') }}" class="text-warning text-decoration-none">Forgot password?</a></div>
                </div>
                <button type="submit" class="btn btn-warning btn-lg w-100">Login</button>
            </form>

            <div class="auth-footer">
                Need an account? <a href="{{ url_for('register') }}" class="text-warning text-decoration-none">Register here</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
