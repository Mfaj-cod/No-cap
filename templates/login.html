{% extends "base.html" %}

{% block title %}Login - {{ Nocap }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card bg-dark text-light shadow-lg border-0">
                <div class="card-body p-4">
                    <h2 class="text-warning mb-3 text-center">Login</h2>
                    <p class="text-white text-center">Access your customer or shop-owner account.</p>
                    <form method="POST" action="{{ url_for('login_user') }}">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" id="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" name="password" class="form-control" required>
                            <small class="d-block mt-2"><a href="{{ url_for('forgot_password') }}" class="text-warning">Forgot password?</a></small>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 btn-lg">Login</button>
                    </form>
                    <p class="small text-center text mt-3 mb-0">
                        Need an account? <a href="{{ url_for('register') }}" class="text-warning">Register here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
