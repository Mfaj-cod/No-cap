{% extends "base.html" %}

{% block title %}Forgot Password - {{ Nocap }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card bg-dark text-light shadow-lg border-0">
                <div class="card-body p-4">
                    <h2 class="text-warning mb-3 text-center">Reset Password</h2>
                    <p class="text-white text-center">Enter your email address and we'll send you an OTP to reset your password.</p>
                    <form method="POST" action="{{ url_for('request_password_reset') }}">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" id="email" name="email" class="form-control" required>
                            <small class="form-text text-muted">We'll send you an OTP to verify your identity.</small>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 btn-lg">Send OTP</button>
                    </form>
                    <p class="small text-center text-white mt-3 mb-0">
                        Remember your password? <a href="{{ url_for('login') }}" class="text-warning">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
